spring.datasource.url=jdbc:mysql://localhost:3306/morya_murti_ghar?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:placeholder}
cloudinary.api_key=${CLOUDINARY_API_KEY:placeholder}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:placeholder}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

server.port=8080
